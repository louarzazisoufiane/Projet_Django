name: CI/CD

# §11 — À chaque push sur la branche principale, la pipeline :
#   1. récupère le code   2. installe Python   3. installe les dépendances
#   4. lance les migrations (env. de test)   5. exécute les tests
#   6. vérifie la qualité du code   7. construit l'image Docker
#   8. publie l'image sur GitHub Container Registry.
# Étapes avancées : scan de sécurité des dépendances, scan de l'image Docker,
# séparation des environnements et notification en cas d'échec.

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # Image publiée sur Docker Hub : <utilisateur>/<nom-image>.
  # L'utilisateur provient du secret DOCKERHUB_USERNAME.
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/django-ecommerce

jobs:
  # ── 1. Tests & qualité du code (environnement de TEST) ─────────────────────
  test:
    name: Tests & qualité du code
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecommerce_db
          POSTGRES_USER: ecommerce_user
          POSTGRES_PASSWORD: ecommerce_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Environnement de test : variables dédiées, jamais celles de production.
    env:
      SECRET_KEY: test-secret-key
      DEBUG: "True"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ecommerce_db
      DB_USER: ecommerce_user
      DB_PASSWORD: ecommerce_password
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      # Qualité du code (§11.6) : barrière sur les erreurs de syntaxe…
      - name: Lint — erreurs critiques
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # …puis vérification complète du style (config dans setup.cfg).
      - name: Lint — style complet
        run: flake8 . --count

      - name: Run migrations (environnement de test)
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --verbosity=2

  # ── 2. Scan de sécurité des dépendances (avancé) ───────────────────────────
  dependency-scan:
    name: Scan sécurité des dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit des dépendances (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          # N'échoue pas la build sur une vulnérabilité (informatif) : retirer
          # `|| true` pour rendre le scan bloquant.
          pip-audit -r requirements.txt --desc || true

  # ── 3. Construction & publication de l'image Docker ────────────────────────
  docker:
    name: Build & push image Docker
    needs: [ test, dependency-scan ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image (application)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (nginx)
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}-nginx:latest
            ${{ env.IMAGE_NAME }}-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
