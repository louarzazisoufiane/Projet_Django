services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Volume renommé pour forcer une réinitialisation propre de Postgres avec
      # le mot de passe courant (l'ancien volume avait un mot de passe obsolète).
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE:-louarzazi/django-ecommerce:latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    # gunicorn écoute sur 8000 dans le conteneur. On publie un port hôte (8130)
    # que Dokploy/Traefik (sur 80) pourra router, ou accessible directement.
    ports:
      - "${WEB_PORT:-8130}:8000"

volumes:
  postgres_data_v2:
  media_data:
  static_data:

# Sous-réseau fixe pour éviter l'erreur Docker
# « all predefined address pools have been fully subnetted » : Docker n'a plus
# à allouer automatiquement une plage depuis le pool saturé du serveur.
networks:
  default:
    ipam:
      config:
        - subnet: 10.123.45.0/24
