services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:

    image: ${WEB_IMAGE:-louarzazi/django-ecommerce:latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"

  nginx:
    # Image nginx avec la config intégrée (publiée par la CI/CD) : aucun bind
    # mount de fichier, donc compatible avec le déploiement « raw » de Dokploy.
    image: ${NGINX_IMAGE:-louarzazi/django-ecommerce-nginx:latest}
    restart: unless-stopped
    depends_on:
      - web
    # On ne publie PAS sur 80 (réservé au Traefik de Dokploy). Port configurable.
    # nginx écoute sur 80 DANS le conteneur → on mappe <port hôte>:80.
    ports:
      - "${NGINX_PORT:-8130}:8000"
    volumes:
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro

volumes:
  postgres_data:
  media_data:
  static_data:

# Sous-réseau fixe pour éviter l'erreur Docker
# « all predefined address pools have been fully subnetted » : Docker n'a plus
# à allouer automatiquement une plage depuis le pool saturé du serveur.
networks:
  default:
    ipam:
      config:
        - subnet: 10.123.45.0/24
