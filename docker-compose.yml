services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # On dérive les identifiants Postgres des MÊMES variables que Django (DB_*),
    # avec des valeurs par défaut intégrées : impossible d'initialiser la base
    # sans utilisateur, même si Dokploy n'interpole pas les variables.
    environment:
      POSTGRES_DB: ${DB_NAME:-ecommerce_db}
      POSTGRES_USER: ${DB_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecommerce123}
    volumes:
      # Volume versionné : un changement de nom force une réinitialisation propre
      # de Postgres avec les identifiants courants.
      - postgres_data_v3:/var/lib/postgresql/data
    healthcheck:
      # $$ → la variable est évaluée par le shell DANS le conteneur (robuste).
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE:-louarzazi/django-ecommerce:latest}
    restart: unless-stopped
    env_file: .env
    # Identifiants base de données : mêmes valeurs/défauts que le service db,
    # garantissant que web et db sont toujours d'accord.
    environment:
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-ecommerce_db}
      DB_USER: ${DB_USER:-ecommerce_user}
      DB_PASSWORD: ${DB_PASSWORD:-ecommerce123}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    # gunicorn écoute sur 8000 dans le conteneur. On publie un port hôte (8130)
    # que Dokploy/Traefik (sur 80) pourra router, ou accessible directement.
    ports:
      - "8130:8000"

volumes:
  postgres_data_v3:
  media_data:
  static_data:

# Sous-réseau fixe pour éviter l'erreur Docker
# « all predefined address pools have been fully subnetted » : Docker n'a plus
# à allouer automatiquement une plage depuis le pool saturé du serveur.
networks:
  default:
    ipam:
      config:
        - subnet: 10.123.45.0/24
